name: Build & Release

on:
  push:
    branches: [main]

jobs:

  # ── 1. Build the Vue/Quasar web bundle ────────────────────────────────────
  web-build:
    name: Web Build (Vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Build web bundle → cordova/www
        working-directory: app
        run: npm run build

      - name: Upload www artifact
        uses: actions/upload-artifact@v4
        with:
          name: www-bundle
          path: app/cordova/www/

  # ── 2. Android APK (debug) ────────────────────────────────────────────────
  android-build:
    name: Android APK (Debug)
    needs: web-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download www bundle
        uses: actions/download-artifact@v4
        with:
          name: www-bundle
          path: app/cordova/www/

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Cordova CLI
        run: npm install -g cordova

      - name: Add Android platform
        working-directory: app/cordova
        run: cordova platform add android

      - name: Build debug APK
        working-directory: app/cordova
        run: cordova build android --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/cordova/platforms/android/app/build/outputs/apk/debug/app-debug.apk

  # ── 3. Publish GitHub Release with APK attached ───────────────────────────
  release:
    name: Publish Release
    needs: android-build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: app-debug-apk
          path: dist/

      - name: Delete existing latest release (if any)
        run: gh release delete latest --yes || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create latest release with APK
        run: |
          gh release create latest \
            --title "Latest Build" \
            --notes "Debug APK built automatically from the latest commit on \`main\`." \
            dist/app-debug.apk
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
