name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────────────
  # 1. Lint + build the Vue/Quasar web bundle
  # ──────────────────────────────────────────────────────
  web-build:
    name: Web Build (Vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web bundle → cordova/www
        run: npm run build

      - name: Upload www artifact
        uses: actions/upload-artifact@v4
        with:
          name: www-bundle
          path: cordova/www/

  # ──────────────────────────────────────────────────────
  # 2. Android APK build (debug)
  # ──────────────────────────────────────────────────────
  android-build:
    name: Android APK (Debug)
    needs: web-build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download www bundle
        uses: actions/download-artifact@v4
        with:
          name: www-bundle
          path: cordova/www/

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Cordova CLI
        run: npm install -g cordova

      - name: Add Android platform
        working-directory: cordova
        run: cordova platform add android

      - name: Install Cordova plugins
        working-directory: cordova
        run: cordova prepare android

      - name: Build debug APK
        working-directory: cordova
        run: cordova build android --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: cordova/platforms/android/app/build/outputs/apk/debug/app-debug.apk

      - name: Create GitHub Release and upload APK
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Debug Build
          body: |
            Auto-built APK from the latest commit on `main`.
            Connects to the live backend at https://hybrid-poc-server.vercel.app
          files: cordova/platforms/android/app/build/outputs/apk/debug/app-debug.apk
          token: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────────────
  # 3. iOS build (macOS runner, needs Apple certs in prod)
  # ──────────────────────────────────────────────────────
  ios-build:
    name: iOS Build (Debug)
    needs: web-build
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download www bundle
        uses: actions/download-artifact@v4
        with:
          name: www-bundle
          path: cordova/www/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Cordova CLI
        run: npm install -g cordova

      - name: Add iOS platform
        working-directory: cordova
        run: cordova platform add ios

      - name: Build iOS (simulator)
        working-directory: cordova
        run: cordova build ios --emulator --debug

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-debug-app
          path: cordova/platforms/ios/build/emulator/
